<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ground Station - CCI GuideBot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f4f8;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1e40af;
      color: #fff;
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; flex: 1; }
    .status-bar { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; opacity: 0.9; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #9ca3af; flex-shrink: 0; }
    .dot.green { background: #4ade80; }
    .dot.yellow { background: #facc15; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .peer-badge {
      font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 99px;
      background: rgba(255,255,255,0.2);
    }
    .peer-badge.online { background: rgba(74,222,128,0.25); color: #bbf7d0; }
    .peer-badge.offline { background: rgba(248,113,113,0.2); color: #fecaca; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1rem;
    }
    @media (max-width: 640px) { main { grid-template-columns: 1fr; } }

    .panel {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 0.75rem 1rem;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 600;
      font-size: 0.9rem;
      color: #374151;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-body { flex: 1; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }

    .log {
      flex: 1;
      overflow-y: auto;
      max-height: 380px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .qa-entry {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      font-size: 0.85rem;
    }
    .qa-entry .q-row {
      padding: 0.45rem 0.7rem;
      background: #eff6ff;
      border-left: 3px solid #2563eb;
      color: #1e3a8a;
    }
    .qa-entry .a-row {
      padding: 0.45rem 0.7rem;
      background: #f0fdf4;
      border-left: 3px solid #16a34a;
      color: #14532d;
      line-height: 1.4;
    }
    .qa-entry .label { font-size: 0.72rem; font-weight: 700; margin-right: 0.35rem; text-transform: uppercase; }
    .qa-entry .time { font-size: 0.72rem; color: #9ca3af; float: right; }
    .log-empty { text-align: center; color: #9ca3af; font-size: 0.8rem; padding: 2rem; }

    .mic-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.7rem 1.25rem;
      border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      background: #2563eb; color: #fff;
      transition: background 0.15s;
    }
    .mic-btn:hover { background: #1d4ed8; }
    .mic-btn.recording { background: #dc2626; animation: rec-pulse 1.2s infinite; }
    .mic-btn.recording:hover { background: #b91c1c; }
    .mic-btn:disabled { background: #9ca3af; cursor: not-allowed; animation: none; }
    @keyframes rec-pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }

    .interim-box {
      min-height: 2.5rem; padding: 0.5rem 0.75rem;
      background: #eff6ff; border: 1px dashed #93c5fd;
      border-radius: 6px; font-size: 0.875rem; color: #1e40af; font-style: italic;
    }

    .send-row { display: flex; gap: 0.5rem; }
    .send-row input {
      flex: 1; padding: 0.55rem 0.75rem;
      border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 0.875rem; outline: none;
    }
    .send-row input:focus { border-color: #2563eb; }
    .send-row button {
      padding: 0.55rem 1rem;
      background: #2563eb; color: #fff;
      border: none; border-radius: 6px;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
    }
    .send-row button:hover { background: #1d4ed8; }

    .clear-btn {
      background: none; border: 1px solid #e5e7eb; border-radius: 5px;
      padding: 0.25rem 0.6rem; font-size: 0.75rem; color: #6b7280; cursor: pointer;
    }
    .clear-btn:hover { background: #f3f4f6; }

    .hint {
      font-size: 0.78rem;
      color: #6b7280;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.4rem 0.65rem;
    }
  </style>
</head>
<body>
<header>
  <h1>Ground Station — CCI GuideBot</h1>
  <div class="status-bar">
    <div class="dot yellow" id="ws-dot"></div>
    <span id="ws-label">Connecting...</span>
    <span class="peer-badge offline" id="peer-badge">Tablet offline</span>
  </div>
</header>

<main>
  <!-- LEFT: Override panel -->
  <div class="panel">
    <div class="panel-header">Operator Override</div>
    <div class="panel-body">
      <p class="hint">Use this to send a custom spoken message directly to the tablet, bypassing the AI.</p>
      <button class="mic-btn" id="mic-btn" disabled>
        <span id="mic-icon">&#127908;</span>
        <span id="mic-label">Start Listening</span>
      </button>
      <div class="interim-box" id="interim-text">Interim transcript will appear here...</div>
      <div class="send-row">
        <input type="text" id="text-input" placeholder="Type override message...">
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: AI conversation log -->
  <div class="panel">
    <div class="panel-header">
      <span>AI Conversation Log</span>
      <button class="clear-btn" id="clear-btn">Clear</button>
    </div>
    <div class="panel-body">
      <div class="log" id="ai-log">
        <div class="log-empty">No visitor questions yet</div>
      </div>
    </div>
  </div>
</main>

<script>
  // ── WebSocket ──────────────────────────────────────────────
  const WS_URL = `wss://${location.host}/ws/ground`;
  let ws = null;
  let reconnectTimer = null;

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      setWsStatus('green', 'Connected');
      clearTimeout(reconnectTimer);
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'peer_status') {
        const online = msg.connected;
        const badge = document.getElementById('peer-badge');
        badge.textContent = online ? 'Tablet online' : 'Tablet offline';
        badge.className = 'peer-badge ' + (online ? 'online' : 'offline');
      } else if (msg.type === 'ai_log') {
        addQAEntry(msg.question, msg.answer);
      }
    };

    ws.onclose = () => {
      setWsStatus('yellow', 'Reconnecting...');
      document.getElementById('peer-badge').textContent = 'Tablet offline';
      document.getElementById('peer-badge').className = 'peer-badge offline';
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();
  }

  function sendOverride(text) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'transcript', text, final: true }));
    }
  }

  function setWsStatus(color, label) {
    document.getElementById('ws-dot').className = `dot ${color}`;
    document.getElementById('ws-label').textContent = label;
  }

  // ── ASR ───────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;

  function setupASR() {
    const btn = document.getElementById('mic-btn');
    if (!SR) {
      btn.disabled = true;
      document.getElementById('mic-label').textContent = 'ASR not supported';
      return;
    }
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onresult = (e) => {
      let interim = '', finalText = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript.trim() + ' ';
        else interim += e.results[i][0].transcript;
      }
      document.getElementById('interim-text').textContent = interim || '';
      if (finalText.trim()) {
        sendOverride(finalText.trim());
        document.getElementById('interim-text').textContent = '';
      }
    };

    recognition.onend = () => {
      if (isListening) try { recognition.start(); } catch (_) {}
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      if (e.error === 'not-allowed') {
        isListening = false;
        setMicState(false);
        alert('Microphone access denied.');
      }
    };

    btn.disabled = false;
  }

  function setMicState(on) {
    isListening = on;
    const btn = document.getElementById('mic-btn');
    if (on) {
      btn.classList.add('recording');
      document.getElementById('mic-icon').textContent = '⏹';
      document.getElementById('mic-label').textContent = 'Stop Listening';
    } else {
      btn.classList.remove('recording');
      document.getElementById('mic-icon').innerHTML = '&#127908;';
      document.getElementById('mic-label').textContent = 'Start Listening';
      document.getElementById('interim-text').textContent = '';
    }
  }

  function toggleMic() {
    if (!recognition) return;
    if (isListening) { isListening = false; recognition.stop(); setMicState(false); }
    else { isListening = true; setMicState(true); try { recognition.start(); } catch (_) {} }
  }

  // ── UI helpers ────────────────────────────────────────────
  function addQAEntry(question, answer) {
    const log = document.getElementById('ai-log');
    const empty = log.querySelector('.log-empty');
    if (empty) empty.remove();

    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const entry = document.createElement('div');
    entry.className = 'qa-entry';
    entry.innerHTML = `
      <div class="q-row"><span class="label">Q</span>${escapeHtml(question)}<span class="time">${time}</span></div>
      <div class="a-row"><span class="label">A</span>${escapeHtml(answer)}</div>
    `;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  function escapeHtml(t) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(t));
    return d.innerHTML;
  }

  // ── Events ────────────────────────────────────────────────
  document.getElementById('mic-btn').addEventListener('click', toggleMic);

  document.getElementById('send-btn').addEventListener('click', () => {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (text) { sendOverride(text); input.value = ''; }
  });

  document.getElementById('text-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('send-btn').click();
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    document.getElementById('ai-log').innerHTML = '<div class="log-empty">No visitor questions yet</div>';
  });

  // ── Init ──────────────────────────────────────────────────
  setupASR();
  connect();
</script>
</body>
</html>
