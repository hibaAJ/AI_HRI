<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCI GuideBot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f4f8;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #065f46;
      color: #fff;
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; flex: 1; }
    .status-bar { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; opacity: 0.9; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #9ca3af; flex-shrink: 0; }
    .dot.green { background: #4ade80; }
    .dot.yellow { background: #facc15; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    main { flex: 1; display: flex; flex-direction: column; gap: 1rem; padding: 1rem; }

    .panel {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel.answer { flex: 2; }
    .panel.ask { flex: 1; }

    .panel-header {
      padding: 0.75rem 1rem;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 600;
      font-size: 0.9rem;
      color: #374151;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-body { flex: 1; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }

    .answer-box {
      font-size: 1.3rem;
      font-weight: 600;
      color: #065f46;
      background: #ecfdf5;
      border: 2px solid #6ee7b7;
      border-radius: 10px;
      padding: 1rem;
      min-height: 5rem;
      line-height: 1.5;
    }
    .answer-box.empty { color: #9ca3af; font-weight: 400; font-size: 1rem; }
    .answer-box.thinking { color: #6b7280; font-weight: 400; font-size: 1rem; font-style: italic; }

    .log { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
    .log-entry {
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .log-entry.question { background: #eff6ff; border-left: 3px solid #2563eb; color: #1e3a8a; }
    .log-entry.answer { background: #f0fdf4; border-left: 3px solid #16a34a; color: #14532d; }
    .log-entry .label { font-size: 0.72rem; color: #9ca3af; margin-right: 0.35rem; font-weight: 600; text-transform: uppercase; }
    .log-empty { text-align: center; color: #9ca3af; font-size: 0.85rem; padding: 2rem; }

    .mic-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.85rem 1.25rem;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      background: #059669; color: #fff;
      transition: background 0.15s;
    }
    .mic-btn:hover { background: #047857; }
    .mic-btn.recording { background: #dc2626; animation: rec-pulse 1.2s infinite; }
    .mic-btn.recording:hover { background: #b91c1c; }
    .mic-btn:disabled { background: #9ca3af; cursor: not-allowed; animation: none; }
    @keyframes rec-pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }

    .interim-box {
      min-height: 2rem; padding: 0.4rem 0.65rem;
      background: #f0fdf4; border: 1px dashed #6ee7b7;
      border-radius: 6px; font-size: 0.85rem; color: #065f46; font-style: italic;
    }

    .send-row { display: flex; gap: 0.5rem; }
    .send-row input {
      flex: 1; padding: 0.55rem 0.75rem;
      border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 0.875rem; outline: none;
    }
    .send-row input:focus { border-color: #059669; }
    .send-row button {
      padding: 0.55rem 1rem;
      background: #059669; color: #fff;
      border: none; border-radius: 6px;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
    }
    .send-row button:hover { background: #047857; }

    .speak-btn {
      padding: 0.55rem 1rem;
      background: #0284c7; color: #fff;
      border: none; border-radius: 6px;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
    }
    .speak-btn:hover { background: #0369a1; }
    .speak-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    .clear-btn {
      background: none; border: 1px solid #e5e7eb; border-radius: 5px;
      padding: 0.25rem 0.6rem; font-size: 0.75rem; color: #6b7280; cursor: pointer;
    }
    .clear-btn:hover { background: #f3f4f6; }

    /* Tap-to-start overlay */
    #tap-overlay {
      position: fixed; inset: 0;
      background: #065f46;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      z-index: 999;
      cursor: pointer;
    }
    #tap-overlay h2 { color: #fff; font-size: 2rem; font-weight: 700; }
    #tap-overlay p { color: #a7f3d0; font-size: 1.1rem; }
    #tap-overlay .tap-icon { font-size: 4rem; }
  </style>
</head>
<body>

<!-- Tap-to-start overlay — required to unlock browser TTS -->
<div id="tap-overlay">
  <div class="tap-icon">&#128242;</div>
  <h2>CCI GuideBot</h2>
  <p>Tap anywhere to activate voice</p>
</div>

<header>
  <h1>CCI GuideBot</h1>
  <div class="status-bar">
    <div class="dot yellow" id="ws-dot"></div>
    <span id="ws-label">Connecting...</span>
  </div>
</header>

<main>
  <!-- Answer panel -->
  <div class="panel answer">
    <div class="panel-header">
      <span>Answer</span>
      <div style="display:flex;gap:0.5rem">
        <button class="speak-btn" id="speak-btn" disabled>Repeat</button>
        <button class="clear-btn" id="clear-btn">Clear</button>
      </div>
    </div>
    <div class="panel-body">
      <div class="answer-box empty" id="answer-box">Ask me anything about CCI...</div>
      <div class="log" id="qa-log">
        <div class="log-empty">No questions yet</div>
      </div>
    </div>
  </div>

  <!-- Ask panel -->
  <div class="panel ask">
    <div class="panel-header">Ask a Question</div>
    <div class="panel-body">
      <button class="mic-btn" id="mic-btn" disabled>
        <span id="mic-icon">&#127908;</span>
        <span id="mic-label">Start Speaking</span>
      </button>
      <div class="interim-box" id="interim-text"></div>
      <div class="send-row">
        <input type="text" id="text-input" placeholder="Or type your question here...">
        <button id="send-btn">Ask</button>
      </div>
    </div>
  </div>
</main>

<script>
  // ── WebSocket ──────────────────────────────────────────────
  const WS_URL = `wss://${location.host}/ws/tablet`;
  let ws = null;
  let reconnectTimer = null;
  let lastAnswer = '';

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      setWsStatus('green', 'Connected');
      clearTimeout(reconnectTimer);
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'ai_response') {
        showAnswer(msg.text);
        speak(msg.text);
      } else if (msg.type === 'transcript' && msg.final) {
        // Operator override: speak it directly
        speak(msg.text);
      }
    };

    ws.onclose = () => {
      setWsStatus('yellow', 'Reconnecting...');
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();
  }

  function askQuestion(text) {
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addToLog('question', text);
    showThinking();
    ws.send(JSON.stringify({ type: 'ai_query', text }));
  }

  function setWsStatus(color, label) {
    document.getElementById('ws-dot').className = `dot ${color}`;
    document.getElementById('ws-label').textContent = label;
  }

  // ── ASR ───────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;

  function setupASR() {
    const btn = document.getElementById('mic-btn');
    if (!SR) {
      btn.disabled = true;
      document.getElementById('mic-label').textContent = 'ASR not supported';
      return;
    }
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onresult = (e) => {
      let interim = '', finalText = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript.trim() + ' ';
        else interim += e.results[i][0].transcript;
      }
      document.getElementById('interim-text').textContent = interim || '';
      if (finalText.trim()) {
        askQuestion(finalText.trim());
        document.getElementById('interim-text').textContent = '';
      }
    };

    recognition.onend = () => {
      if (isListening) try { recognition.start(); } catch (_) {}
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      if (e.error === 'not-allowed') {
        isListening = false;
        setMicState(false);
        alert('Microphone access denied. Please allow microphone access and reload.');
      }
    };

    btn.disabled = false;
  }

  function setMicState(on) {
    isListening = on;
    const btn = document.getElementById('mic-btn');
    if (on) {
      btn.classList.add('recording');
      document.getElementById('mic-icon').textContent = '⏹';
      document.getElementById('mic-label').textContent = 'Stop Listening';
    } else {
      btn.classList.remove('recording');
      document.getElementById('mic-icon').innerHTML = '&#127908;';
      document.getElementById('mic-label').textContent = 'Start Speaking';
      document.getElementById('interim-text').textContent = '';
    }
  }

  function toggleMic() {
    if (!recognition) return;
    if (isListening) { isListening = false; recognition.stop(); setMicState(false); }
    else { isListening = true; setMicState(true); try { recognition.start(); } catch (_) {} }
  }

  // ── TTS ───────────────────────────────────────────────────
  let voices = [];
  let ttsUnlocked = false;

  function loadVoices() {
    const v = speechSynthesis.getVoices();
    if (v.length > 0) voices = v;
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  function getBestVoice() {
    return voices.find(v => v.lang.startsWith('en')) || null;
  }

  document.getElementById('tap-overlay').addEventListener('click', () => {
    // Unlock TTS with a real user gesture
    const utt = new SpeechSynthesisUtterance('Welcome to CCI GuideBot');
    utt.lang = 'en-US';
    const v = getBestVoice();
    if (v) utt.voice = v;
    speechSynthesis.speak(utt);
    ttsUnlocked = true;
    document.getElementById('tap-overlay').style.display = 'none';
  });

  function speak(text) {
    if (!text) return;
    speechSynthesis.cancel();
    setTimeout(() => {
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      const v = getBestVoice();
      if (v) utt.voice = v;
      speechSynthesis.speak(utt);
    }, 150);
  }

  // ── UI helpers ────────────────────────────────────────────
  function showAnswer(text) {
    lastAnswer = text;
    const box = document.getElementById('answer-box');
    box.className = 'answer-box';
    box.textContent = text;
    document.getElementById('speak-btn').disabled = false;
    addToLog('answer', text);
  }

  function showThinking() {
    const box = document.getElementById('answer-box');
    box.className = 'answer-box thinking';
    box.textContent = 'Thinking...';
    document.getElementById('speak-btn').disabled = true;
  }

  function addToLog(type, text) {
    const log = document.getElementById('qa-log');
    const empty = log.querySelector('.log-empty');
    if (empty) empty.remove();
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    const label = type === 'question' ? 'Q' : 'A';
    entry.innerHTML = `<span class="label">${label}</span>${escapeHtml(text)}`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  function escapeHtml(t) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(t));
    return d.innerHTML;
  }

  // ── Events ────────────────────────────────────────────────
  document.getElementById('mic-btn').addEventListener('click', toggleMic);

  document.getElementById('send-btn').addEventListener('click', () => {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (text) { askQuestion(text); input.value = ''; }
  });

  document.getElementById('text-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('send-btn').click();
  });

  document.getElementById('speak-btn').addEventListener('click', () => {
    if (lastAnswer) speak(lastAnswer);
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    document.getElementById('qa-log').innerHTML = '<div class="log-empty">No questions yet</div>';
    const box = document.getElementById('answer-box');
    box.className = 'answer-box empty';
    box.textContent = 'Ask me anything about CCI...';
    lastAnswer = '';
    document.getElementById('speak-btn').disabled = true;
  });

  // ── Init ──────────────────────────────────────────────────
  setupASR();
  connect();
</script>
</body>
</html>
