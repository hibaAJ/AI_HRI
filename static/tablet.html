<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablet - HRI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f4f8;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #065f46;
      color: #fff;
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; flex: 1; }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      opacity: 0.9;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #9ca3af;
      flex-shrink: 0;
    }
    .dot.green { background: #4ade80; }
    .dot.yellow { background: #facc15; animation: pulse 1s infinite; }
    .dot.red { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
    }

    .panel {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel.receive { flex: 2; }
    .panel.send { flex: 1; }

    .panel-header {
      padding: 0.75rem 1rem;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 600;
      font-size: 0.9rem;
      color: #374151;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-body {
      flex: 1;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Message display */
    .log {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .log-entry {
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .log-entry.received {
      background: #f0fdf4;
      border-left: 3px solid #16a34a;
      color: #14532d;
    }
    .log-entry.sent {
      background: #eff6ff;
      border-left: 3px solid #2563eb;
      color: #1e3a8a;
    }
    .log-entry .time {
      font-size: 0.73rem;
      color: #9ca3af;
      margin-right: 0.4rem;
    }
    .log-empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.85rem;
      padding: 2rem;
    }

    /* Latest message big display */
    .latest-msg {
      font-size: 1.3rem;
      font-weight: 600;
      color: #065f46;
      background: #ecfdf5;
      border: 2px solid #6ee7b7;
      border-radius: 10px;
      padding: 1rem;
      min-height: 4rem;
      line-height: 1.4;
    }
    .latest-msg.empty { color: #9ca3af; font-weight: 400; font-size: 1rem; }

    /* Mic button */
    .mic-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #059669;
      color: #fff;
      transition: background 0.15s;
    }
    .mic-btn:hover { background: #047857; }
    .mic-btn.recording { background: #dc2626; animation: rec-pulse 1.2s infinite; }
    .mic-btn.recording:hover { background: #b91c1c; }
    .mic-btn:disabled { background: #9ca3af; cursor: not-allowed; animation: none; }
    @keyframes rec-pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }

    .interim-box {
      min-height: 2rem;
      padding: 0.4rem 0.65rem;
      background: #f0fdf4;
      border: 1px dashed #6ee7b7;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #065f46;
      font-style: italic;
    }

    .send-row {
      display: flex;
      gap: 0.5rem;
    }
    .send-row input {
      flex: 1;
      padding: 0.55rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      outline: none;
    }
    .send-row input:focus { border-color: #059669; }
    .send-row button {
      padding: 0.55rem 1rem;
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .send-row button:hover { background: #047857; }

    .tts-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      color: #374151;
    }
    .tts-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }

    .clear-btn {
      align-self: flex-end;
      background: none;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
      color: #6b7280;
      cursor: pointer;
    }
    .clear-btn:hover { background: #f3f4f6; }

    .speak-btn {
      padding: 0.65rem 1rem;
      background: #0284c7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .speak-btn:hover { background: #0369a1; }
    .speak-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    .peer-badge {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      background: rgba(255,255,255,0.2);
    }
    .peer-badge.online { background: rgba(74,222,128,0.25); color: #bbf7d0; }
    .peer-badge.offline { background: rgba(248,113,113,0.2); color: #fecaca; }
  </style>
</head>
<body>
<header>
  <h1>Tablet</h1>
  <div class="status-bar">
    <div class="dot yellow" id="ws-dot"></div>
    <span id="ws-label">Connecting...</span>
    <span class="peer-badge offline" id="peer-badge">Ground offline</span>
  </div>
</header>

<main>
  <!-- TOP: Receive panel -->
  <div class="panel receive">
    <div class="panel-header">
      <span>From Ground Station</span>
      <button class="clear-btn" id="clear-recv-btn">Clear</button>
    </div>
    <div class="panel-body">
      <div class="tts-row">
        <input type="checkbox" id="tts-toggle" checked>
        <label for="tts-toggle">Auto-speak received messages</label>
      </div>
      <div class="latest-msg empty" id="latest-msg">Waiting for messages...</div>
      <button class="speak-btn" id="speak-btn" disabled>Speak Last Message</button>
      <div class="log" id="recv-log">
        <div class="log-empty">Nothing received yet</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM: Send panel -->
  <div class="panel send">
    <div class="panel-header">Microphone / Reply</div>
    <div class="panel-body">
      <button class="mic-btn" id="mic-btn" disabled>
        <span id="mic-icon">&#127908;</span>
        <span id="mic-label">Start Listening</span>
      </button>
      <div class="interim-box" id="interim-text"></div>
      <div class="send-row">
        <input type="text" id="text-input" placeholder="Type a reply and press Enter...">
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>
</main>

<script>
  // ── WebSocket ──────────────────────────────────────────────
  const WS_URL = `wss://${location.host}/ws/tablet`;
  let ws = null;
  let reconnectTimer = null;

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      setWsStatus('green', 'Connected');
      clearTimeout(reconnectTimer);
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'peer_status') {
        const online = msg.connected;
        const badge = document.getElementById('peer-badge');
        badge.textContent = online ? 'Ground online' : 'Ground offline';
        badge.className = 'peer-badge ' + (online ? 'online' : 'offline');
      } else if (msg.type === 'transcript' && msg.final) {
        addLog('recv-log', msg.text, 'received');
        showLatest(msg.text);
        if (document.getElementById('tts-toggle').checked) speak(msg.text);
      }
    };

    ws.onclose = () => {
      setWsStatus('yellow', 'Reconnecting...');
      const badge = document.getElementById('peer-badge');
      badge.textContent = 'Ground offline';
      badge.className = 'peer-badge offline';
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();
  }

  function sendMsg(text, isFinal = true) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'transcript', text, final: isFinal }));
    }
  }

  function setWsStatus(color, label) {
    document.getElementById('ws-dot').className = `dot ${color}`;
    document.getElementById('ws-label').textContent = label;
  }

  // ── ASR ───────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;

  function setupASR() {
    const btn = document.getElementById('mic-btn');
    if (!SR) {
      btn.disabled = true;
      document.getElementById('mic-label').textContent = 'ASR not supported in this browser';
      return;
    }

    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onresult = (e) => {
      let interim = '';
      let finalText = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          finalText += e.results[i][0].transcript.trim() + ' ';
        } else {
          interim += e.results[i][0].transcript;
        }
      }
      document.getElementById('interim-text').textContent = interim || '';
      if (finalText.trim()) {
        const t = finalText.trim();
        sendMsg(t, true);
        document.getElementById('interim-text').textContent = '';
      }
    };

    recognition.onend = () => {
      if (isListening) {
        try { recognition.start(); } catch (_) {}
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      console.warn('ASR error:', e.error);
      if (e.error === 'not-allowed') {
        isListening = false;
        setMicState(false);
        alert('Microphone access denied. Please allow microphone access and reload.');
      }
    };

    btn.disabled = false;
  }

  function setMicState(listening) {
    isListening = listening;
    const btn = document.getElementById('mic-btn');
    if (listening) {
      btn.classList.add('recording');
      document.getElementById('mic-icon').textContent = '\u23F9';
      document.getElementById('mic-label').textContent = 'Stop Listening';
    } else {
      btn.classList.remove('recording');
      document.getElementById('mic-icon').innerHTML = '&#127908;';
      document.getElementById('mic-label').textContent = 'Start Listening';
      document.getElementById('interim-text').textContent = '';
    }
  }

  function toggleMic() {
    if (!recognition) return;
    if (isListening) {
      isListening = false;
      recognition.stop();
      setMicState(false);
    } else {
      isListening = true;
      setMicState(true);
      try { recognition.start(); } catch (_) {}
    }
  }

  // ── TTS ───────────────────────────────────────────────────
  let voices = [];
  let lastReceivedText = '';

  function loadVoices() {
    const v = speechSynthesis.getVoices();
    if (v.length > 0) voices = v;
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  function getBestVoice() {
    return voices.find(v => v.lang.startsWith('en')) || null;
  }

  // iOS Safari blocks speechSynthesis unless called from a direct user gesture.
  // Unlock by speaking a near-silent utterance on first touch/click.
  let ttsUnlocked = false;
  function unlockTTS() {
    if (ttsUnlocked) return;
    ttsUnlocked = true;
    const utt = new SpeechSynthesisUtterance(' ');
    utt.volume = 0.1;
    utt.lang = 'en-US';
    const v = getBestVoice();
    if (v) utt.voice = v;
    speechSynthesis.speak(utt);
  }
  document.addEventListener('touchstart', unlockTTS, { once: true });
  document.addEventListener('click', unlockTTS, { once: true });

  function speak(text) {
    if (!text) return;
    speechSynthesis.cancel();
    setTimeout(() => {
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      utt.rate = 1;
      utt.pitch = 1;
      const v = getBestVoice();
      if (v) utt.voice = v;
      speechSynthesis.speak(utt);
    }, 150);
  }

  document.getElementById('speak-btn').addEventListener('click', () => {
    if (lastReceivedText) speak(lastReceivedText);
  });

  // ── UI helpers ────────────────────────────────────────────
  function addLog(logId, text, type) {
    const log = document.getElementById(logId);
    const empty = log.querySelector('.log-empty');
    if (empty) empty.remove();

    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    entry.innerHTML = `<span class="time">${time}</span>${escapeHtml(text)}`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  function showLatest(text) {
    lastReceivedText = text;
    const el = document.getElementById('latest-msg');
    el.className = 'latest-msg';
    el.textContent = text;
    document.getElementById('speak-btn').disabled = false;
  }

  function escapeHtml(t) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(t));
    return d.innerHTML;
  }

  // ── Events ────────────────────────────────────────────────
  document.getElementById('mic-btn').addEventListener('click', toggleMic);

  document.getElementById('send-btn').addEventListener('click', () => {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (text) {
      sendMsg(text);
      input.value = '';
    }
  });

  document.getElementById('text-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('send-btn').click();
  });

  document.getElementById('clear-recv-btn').addEventListener('click', () => {
    document.getElementById('recv-log').innerHTML = '<div class="log-empty">Nothing received yet</div>';
    const el = document.getElementById('latest-msg');
    el.className = 'latest-msg empty';
    el.textContent = 'Waiting for messages...';
    lastReceivedText = '';
    document.getElementById('speak-btn').disabled = true;
  });

  // ── Init ──────────────────────────────────────────────────
  setupASR();
  connect();
</script>
</body>
</html>
